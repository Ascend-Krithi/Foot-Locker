name: FootLocker Automation CI

on:
  push:
    branches: [ "main", "feature/**", "Feature-*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Validate POM
        run: mvn -q -B validate

      - name: Install Chrome (stable)
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Show Chrome version
        run: |
          echo "Chrome path: ${{ steps.chrome.outputs.chrome-path }}"
          ${{ steps.chrome.outputs.chrome-path }} --version

      - name: Remove preinstalled chromedriver
        run: |
          if command -v chromedriver; then
            sudo rm -f "$(command -v chromedriver)"
          fi

      - name: Install Xvfb & FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Start Xvfb
        env:
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac >/dev/null 2>&1 &
          sleep 2

      - name: Start screen recording
        env:
          DISPLAY: ":99"
        run: |
          mkdir -p recordings
          ffmpeg -y -f x11grab -framerate 30 -video_size 1920x1080 -i ${DISPLAY} -c:v libx264 -pix_fmt yuv420p -preset veryfast -crf 23 -movflags +faststart recordings/test-run.mp4 >/dev/null 2>&1 &
          echo $! > ffmpeg.pid

      - name: Run Tests
        env:
          DISPLAY: ":99"
          HEADLESS: "false"
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          unset CHROMEWEBDRIVER || true
          mvn -B -fae -Dheadless=false -Dwebdriver.http.factory=jdk-http-client -DchromeBinary="${{ steps.chrome.outputs.chrome-path }}" test

      - name: Stop screen recording
        if: always()
        run: |
          if [ -f ffmpeg.pid ]; then
            kill $(cat ffmpeg.pid) || true
            sleep 2
          fi

      - name: Upload test video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-video
          path: recordings/test-run.mp4
          retention-days: 7

      - name: Upload ExtentReport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: test-output/ExtentReport.html
          retention-days: 7

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: test-output/screenshots/
          retention-days: 7
