name: Selenium Tests

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Install Chrome (stable)
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Remove preinstalled chromedriver
        run: |
          if command -v chromedriver; then
            sudo rm -f "$(command -v chromedriver)"
          fi

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Start Xvfb (Virtual Display)
        env:
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac >/dev/null 2>&1 &
          sleep 2

      - name: Start screen recording
        env:
          DISPLAY: ":99"
        run: |
          ffmpeg -f x11grab -video_size 1920x1080 -i :99 -codec:v libx264 -r 12 test-recording.mp4 >/dev/null 2>&1 &
          echo $! > ffmpeg.pid

      - name: Run Tests (headed)
        env:
          DISPLAY: ":99"
          HEADLESS: "false"
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          unset CHROMEWEBDRIVER || true
          mvn -B -fae \
            -Dheadless=false \
            -Dwebdriver.http.factory=jdk-http-client \
            -DchromeBinary="${{ steps.chrome.outputs.chrome-path }}" \
            test

      - name: Stop screen recording
        if: always()
        run: |
          if [ -f ffmpeg.pid ]; then
            kill $(cat ffmpeg.pid) || true
            sleep 2
          fi

      - name: Upload test video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-recording
          path: test-recording.mp4
          retention-days: 7

      - name: Upload ExtentReport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: target/extent-reports/
          retention-days: 7

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: target/screenshots/
          retention-days: 7