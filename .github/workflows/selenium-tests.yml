name: FootLocker Automation CI

on:
  push:
    branches: [ "main", "feature/**", "Feature-*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      # Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- JAVA ----------------
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # ---------------- CHROME ----------------
      - name: Install Chrome Stable
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Show Chrome Version
        run: |
          echo "Chrome path: ${{ steps.chrome.outputs.chrome-path }}"
          ${{ steps.chrome.outputs.chrome-path }} --version

      # Remove Ubuntu's old chromedriver
      - name: Remove preinstalled chromedriver
        run: |
          if command -v chromedriver; then
            sudo rm -f "$(command -v chromedriver)"
          fi
          echo "chromedriver removed"

      # ---------------- VIDEO SETUP ----------------
      - name: Install Xvfb & FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Start Xvfb on Display :99
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 -ac &
        env:
          DISPLAY: ":99"

      - name: Start Screen Recording
        run: |
          export DISPLAY=:99
          mkdir -p recordings
          ffmpeg -y -video_size 1920x1080 -f x11grab -i :99 \
            -r 25 -codec:v libx264 -preset ultrafast \
            recordings/test-run.mp4 > /dev/null 2>&1 &
        env:
          DISPLAY: ":99"

      # ---------------- RUN TESTS ----------------
      - name: Run TS001 Tests
        env:
          DISPLAY: ":99"
          HEADLESS: "false"
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          unset CHROMEWEBDRIVER || true
          mvn -X -B -fae \
            -DskipTests=false \
            -Dheadless=false \
            -Dwebdriver.http.factory=jdk-http-client \
            -DchromeBinary="${{ steps.chrome.outputs.chrome-path }}" \
            -Dtest=TS001_TC001,TS001_TC002 \
            test

      # ---------------- STOP VIDEO ----------------
      - name: Stop Screen Recording
        if: always()
        run: |
          pkill -15 ffmpeg || true
          sleep 2
          ls -lh recordings

      # ---------------- ARTIFACTS ----------------
      - name: Upload Artifacts (Reports + Video)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-artifacts
          path: |
            recordings/test-run.mp4
            **/target/surefire-reports/**
            **/test-output/**
            **/ExtentReport.html
          if-no-files-found: warn
