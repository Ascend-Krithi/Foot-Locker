name: FootLocker Automation CI (safety POM + video)

on:
  push:
    branches: [ "main", "feature/**", "Feature-*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # ---------- SAFETY-NET: overwrite pom.xml on the runner ----------
      # This guarantees a valid POM (source/target, no --release) even if repo POM was corrupted.
      - name: Write clean pom.xml (temporary safety-net)
        run: |
          cat > pom.xml <<'XML'
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 https://maven.apache.org/xsd/maven-4.0.0.xsd">

            <modelVersion>4.0.0</modelVersion>

            <groupId>com.fl</groupId>
            <artifactId>footlocker-automation</artifactId>
            <version>1.0-SNAPSHOT</version>

            <properties>
              <maven.compiler.source>17</maven.compiler.source>
              <maven.compiler.target>17</maven.compiler.target>
              <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>
              <lombok.version>1.18.32</lombok.version>
              <surefire.version>3.2.5</surefire.version>
            </properties>

            <dependencies>
              <dependency>
                <groupId>org.seleniumhq.selenium</groupId>
                <artifactId>selenium-java</artifactId>
                <version>4.21.0</version>
              </dependency>

              <dependency>
                <groupId>io.github.bonigarcia</groupId>
                <artifactId>webdrivermanager</artifactId>
                <version>5.9.2</version>
              </dependency>

              <dependency>
                <groupId>org.testng</groupId>
                <artifactId>testng</artifactId>
                <version>7.10.2</version>
                <scope>test</scope>
              </dependency>

              <dependency>
                <groupId>com.aventstack</groupId>
                <artifactId>extentreports</artifactId>
                <version>5.1.1</version>
              </dependency>

              <dependency>
                <groupId>org.projectlombok</groupId>
                <artifactId>lombok</artifactId>
                <version>${lombok.version}</version>
                <scope>provided</scope>
              </dependency>
            </dependencies>

            <build>
              <plugins>

                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-compiler-plugin</artifactId>
                  <version>3.13.0</version>
                  <configuration>
                    <!-- IMPORTANT: use source/target (NOT release) -->
                    <source>${maven.compiler.source}</source>
                    <target>${maven.compiler.target}</target>
                    <encoding>${project.build.sourceEncoding}</encoding>

                    <annotationProcessorPaths>
                      <path>
                        <groupId>org.projectlombok</groupId>
                        <artifactId>lombok</artifactId>
                        <version>${lombok.version}</version>
                      </path>
                    </annotationProcessorPaths>

                    <!-- Allowed (and needed for some Lombok/JDK 17 combos) when not using --release -->
                    <compilerArgs>
                      <arg>--add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED</arg>
                      <arg>--add-exports=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED</arg>
                      <arg>--add-exports=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED</arg>
                      <arg>--add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED</arg>
                      <arg>--add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED</arg>
                      <arg>--add-exports=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED</arg>
                      <arg>--add-exports=jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED</arg>
                    </compilerArgs>
                  </configuration>
                </plugin>

                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-surefire-plugin</artifactId>
                  <version>${surefire.version}</version>
                  <configuration>
                    <suiteXmlFiles>
                      <suiteXmlFile>src/test/resources/testng.xml</suiteXmlFile>
                    </suiteXmlFiles>
                    <testFailureIgnore>false</testFailureIgnore>
                  </configuration>
                </plugin>

              </plugins>
            </build>

          </project>
          XML

      - name: Validate POM
        run: mvn -q -B validate

      # ---------- Chrome ----------
      - name: Install Chrome (stable)
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Show Chrome version
        run: |
          echo "Chrome path: ${{ steps.chrome.outputs.chrome-path }}"
          ${{ steps.chrome.outputs.chrome-path }} --version

      - name: Remove preinstalled chromedriver (avoid mismatch)
        run: |
          if command -v chromedriver; then
            sudo rm -f "$(command -v chromedriver)"
          fi

      # ---------- Video ----------
      - name: Install Xvfb & FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Start Xvfb
        env:
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac &

      - name: Start screen recording
        env:
          DISPLAY: ":99"
        run: |
          mkdir -p recordings
          ffmpeg -y -video_size 1920x1080 -f x11grab -i :99 \
                 -r 25 -codec:v libx264 -preset ultrafast \
                 recordings/test-run.mp4 > /dev/null 2>&1 &

      # ---------- Tests ----------
      - name: Run TS001 tests (headed on Xvfb :99)
        env:
          DISPLAY: ":99"
          HEADLESS: "false"
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          unset CHROMEWEBDRIVER || true
          mvn -X -B -fae \
            -Dheadless=false \
            -Dwebdriver.http.factory=jdk-http-client \
            -DchromeBinary="${{ steps.chrome.outputs.chrome-path }}" \
            -Dtest=TS001_TC001,TS001_TC002 \
            test

      # ---------- Artifacts ----------
      - name: Stop screen recording
        if: always()
        run: |
          pkill -15 ffmpeg || true
          sleep 2
          ls -lh recordings || true

      - name: Upload Artifacts (Video + Reports)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-artifacts
          path: |
            recordings/test-run.mp4
            **/target/surefire-reports/**
            **/test-output/**
            **/ExtentReport.html
          if-no-files-found: warn
