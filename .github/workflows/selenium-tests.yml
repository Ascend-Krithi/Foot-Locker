name: Maven CI (TS001_TC001 + TS001_TC002)

on:
  push:
    branches: [ "main", "feature/**", "Feature-*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Print workspace & list files
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          ls -la

      - name: Ensure pom.xml exists at repo root
        run: |
          test -f pom.xml && echo "pom.xml found at repo root ✅" || (echo "❌ pom.xml NOT found at repo root" && exit 1)

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Install Google Chrome on the runner and expose its absolute path
      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Show Chrome binary info
        run: |
          echo "chrome-path: ${{ steps.chrome.outputs.chrome-path }}"
          which google-chrome || true
          which chrome || true
          google-chrome --version || true
          chrome --version || true

      # Run ONLY the 2 tests; pass headless + jdk-http-client + chromeBinary
      - name: Build & run tests (debug)
        env:
          HEADLESS: "true"
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          mvn -X -B -fae \
            -DskipTests=false \
            -Dheadless=true \
            -Dwebdriver.http.factory=jdk-http-client \
            -Dtest=TS001_TC001,TS001_TC002 \
            -DchromeBinary="${{ steps.chrome.outputs.chrome-path }}" \
            test

      # Print summaries into logs for quick triage
      - name: Show Surefire/TestNG summaries
        if: always()
        run: |
          echo "===== surefire report directories ====="
          find . -type d -path "*/target/surefire-reports" -print || true
          echo "===== surefire *.txt (first 200 lines each) ====="
          found=false
          for f in $(find . -type f -path "*/target/surefire-reports/*.txt"); do
            found=true
            echo "----- $f -----"
            sed -n '1,200p' "$f"
          done
          if [ "$found" = false ]; then
            echo "No surefire .txt files found."
          fi
          echo "===== TestNG emailable-report.html (first 200 lines if present) ====="
          for h in $(find . -type f -path "*/test-output/emailable-report.html"); do
            echo "----- $h -----"
            sed -n '1,200p' "$h" || true
          done
          echo "===== ExtentReport.html (first 200 lines if present) ====="
          for e in $(find . -type f -name "ExtentReport.html"); do
            echo "----- $e -----"
            sed -n '1,200p' "$e" || true
          done

      # Downloadable artifacts (Extent + TestNG + Surefire)
      - name: Upload Test Reports (Surefire + TestNG + Extent)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/**
            **/test-output/**
            **/ExtentReport.html
          if-no-files-found: warn
