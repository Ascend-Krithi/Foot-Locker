name: FootLocker Automation CI

on:
  push:
    branches: [ "main", "feature/**", "Feature-*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Show Chrome Version
        run: |
          echo "Chrome Path: ${{ steps.chrome.outputs.chrome-path }}"
          ${{ steps.chrome.outputs.chrome-path }} --version

      - name: Remove default chromedriver
        run: |
          if command -v chromedriver; then
            sudo rm -f "$(command -v chromedriver)"
          fi

      - name: Install Xvfb & FFmpeg
        run: |
          sudo apt update
          sudo apt install -y xvfb ffmpeg

      - name: Start Xvfb
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 -ac &
        env:
          DISPLAY: ":99"

      - name: Start Screen Recording
        run: |
          export DISPLAY=:99
          mkdir -p recordings
          ffmpeg -y -video_size 1920x1080 -f x11grab -i :99 \
            -r 25 -vcodec libx264 -preset ultrafast \
            recordings/test-run.mp4 > /dev/null 2>&1 &
        env:
          DISPLAY: ":99"

      - name: Run Test Scripts (TS001)
        env:
          DISPLAY: ":99"
          HEADLESS: "false"
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          unset CHROMEWEBDRIVER || true
          mvn -X -B -fae \
            -Dheadless=false \
            -DchromeBinary="${{ steps.chrome.outputs.chrome-path }}" \
            -Dwebdriver.http.factory=jdk-http-client \
            -Dtest=TS001_TC001,TS001_TC002 \
            test

      - name: Stop Recording
        if: always()
        run: |
          pkill -15 ffmpeg || true
          sleep 2

      - name: Upload Artifacts (Video + Reports)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-artifacts
          path: |
            recordings/test-run.mp4
            **/target/surefire-reports/**
            **/test-output/**
            **/ExtentReport.html
